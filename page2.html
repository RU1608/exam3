<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Analytics - Careers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Точечный фон */
        .bg-dots {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-[#030712] text-white font-sans antialiased bg-dots min-h-screen flex flex-col justify-between">

    <header class="max-w-7xl w-full mx-auto px-4 py-5 flex items-center justify-between">
        <div class="flex items-center space-x-2 font-bold text-xl tracking-tight">
            <span class="bg-white text-black px-2 py-0.5 rounded font-black text-sm">CA</span>
            <span>Catalyst <span class="text-gray-400 font-normal">Analytics</span></span>
        </div>

        <nav class="hidden md:flex items-center space-x-8 text-sm text-gray-300">
            <a href="index.html" class="hover:text-white transition">Home</a>
            <a href="page1.html" class="hover:text-white transition">Services</a>
            <a href="page2.html" class="text-white font-semibold">Careers</a>
            <a href="page3.html" class="hover:text-white transition">Career Details</a>
            <a href="page4.html" class="hover:text-white transition">Contact</a>
        </nav>

        <div>
            <a href="#" class="bg-[#0084ff] hover:bg-[#0073e6] text-white px-5 py-2.5 rounded-xl text-sm font-medium transition inline-block">
                Contact Us
            </a>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto px-4 py-8 space-y-12 my-auto">
        
        <div class="relative bg-[#0b0f19] rounded-[32px] overflow-hidden border border-gray-800/60 px-6 py-10 sm:p-12 md:p-16 grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
            
            <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px); background-size: 40px 40px;"></div>
            
            <div class="relative z-10 md:col-span-7 space-y-6 text-center md:text-left max-w-[540px] mx-auto md:mx-0">
                <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight leading-tight">
                    Build the Future with Us
                </h2>
                <p class="text-gray-400 text-sm sm:text-base leading-relaxed">
                    We're a team of builders, thinkers, and explorers using AI, machine learning, and blockchain to solve meaningful problems.
                </p>
                <div class="pt-2">
                    <a href="#" class="bg-[#0084ff] hover:bg-[#0073e6] text-white px-6 py-3 rounded-xl text-sm font-medium transition inline-block w-full sm:w-auto">
                        Explore Open Positions
                    </a>
                </div>
            </div>

            <div class="relative z-10 md:col-span-5 flex justify-center">
                <div class="absolute w-60 h-60 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
                <img src="./761bea50aa3255c343c9cde04d43b35de22e0b57.png" 
                     alt="3D Briefcase Illustration" 
                     class="max-w-[220px] sm:max-w-[260px] w-full object-contain filter drop-shadow-[0_10px_25px_rgba(0,132,255,0.25)]">
            </div>
        </div>

        <div class="bg-[#0b0f19]/60 border border-gray-900 rounded-2xl p-4 md:p-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-center">
                
                <div class="relative">
                    <select class="w-full bg-[#161b26] text-gray-300 text-sm rounded-xl px-4 py-3 appearance-none border border-gray-800/80 focus:outline-none focus:border-blue-500">
                        <option>Departments</option>
                    </select>
                    <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
                </div>

                <div class="relative">
                    <select class="w-full bg-[#161b26] text-gray-300 text-sm rounded-xl px-4 py-3 appearance-none border border-gray-800/80 focus:outline-none focus:border-blue-500">
                        <option>Experience</option>
                    </select>
                    <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
                </div>

                <div class="relative">
                    <select class="w-full bg-[#161b26] text-gray-300 text-sm rounded-xl px-4 py-3 appearance-none border border-gray-800/80 focus:outline-none focus:border-blue-500">
                        <option>Job Type</option>
                    </select>
                    <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
                </div>

                <div class="relative">
                    <select class="w-full bg-[#161b26] text-gray-300 text-sm rounded-xl px-4 py-3 appearance-none border border-gray-800/80 focus:outline-none focus:border-blue-500">
                        <option>Workplace Type</option>
                    </select>
                    <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
                </div>

                <div class="relative lg:col-span-1 sm:col-span-2">
                    <input type="text" placeholder="Search by keywords..." class="w-full bg-[#161b26] text-gray-300 text-sm rounded-xl pl-4 pr-12 py-3 border border-gray-800/80 focus:outline-none focus:border-blue-500 placeholder-gray-600">
                    <button class="absolute right-2 top-1/2 -translate-y-1/2 bg-[#0084ff] hover:bg-[#0073e6] p-2 rounded-lg transition">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </button>
                </div>

            </div>
        </div>

        <div class="text-center pt-4">
            <h3 class="text-3xl sm:text-4xl font-bold tracking-tight">
                Open Positions
            </h3>
        </div>

    </main>

    <div class="py-6"></div>

</body>
</html>
